<!DOCTYPE html>
 <head>
  <meta charset="utf-8">
 </head>
 <body>
    <canvas id='scale_1px' style='display:none;'></canvas>
    <canvas id='scale' style='display:none;' onClick='hide("scale")'></canvas>
    <div id='start_form'>
	<form>
	    <div>Size A in millimetres: <input id='sizeA' type=text value=190></div>
	    <div>Coin size in millimetres: <input id='coinSize' type=text value=26></div>
	    <input type=button value=Generate onClick='generate()'>
	    <br><br>
	</form>
    <div>Example for A4, the size A is different for each printer model.</div>
    <img src="../../../../images/sample.jpg">
    </div>
	
	<div id="images" style="display:none;">
		<br>
		<div id="info" style="text-align: center;">
			<input type="button" onclick='hide("info")' value="Click on image to remove from print">
		</div>
		<br>
		<div style="text-align: center;">
			Once you’re <span style="color: red;">satisfied</span> with the images on this page, press <span style="color: red;">Ctrl+P</span> to open the print view and <span style="color: red;">print</span> the page.
		</div>
		<br>
	</div>
	
 </body>
<script>

    var dpi = 300;
    var mm_in = 25.4;
    var c_width;
    var mm_width;

	const coins = ["1) Figures/Mirakel's bash-logo.png","1) Figures/Mirakel's boomer-logo.png","1) Figures/Mirakel's camo-logo.png","1) Figures/Mirakel's chop-chop-logo.png","1) Figures/Mirakel's cynder-logo.png","1) Figures/Mirakel's dino-rang-logo.png","1) Figures/Mirakel's double-trouble-logo.png","1) Figures/Mirakel's drill-sergeant-logo.png","1) Figures/Mirakel's drobot-logo.png","1) Figures/Mirakel's eruptor-logo.png","1) Figures/Mirakel's flameslinger-logo.png","1) Figures/Mirakel's ghost-roaster-logo.png","1) Figures/Mirakel's gill-grunt-logo.png","1) Figures/Mirakel's hex-logo.png","1) Figures/Mirakel's ignitor-logo.png","1) Figures/Mirakel's lightning-rod-logo.png","1) Figures/Mirakel's prism-break-logo.png","1) Figures/Mirakel's slam-bam-logo.png","1) Figures/Mirakel's sonic-boom-logo.png","1) Figures/Mirakel's spyro-logo.png","1) Figures/Mirakel's stealth-elf-logo.png","1) Figures/Mirakel's stump-smash-logo.png","1) Figures/Mirakel's sunburn-logo.png","1) Figures/Mirakel's terrafin-logo.png","1) Figures/Mirakel's trigger-happy-logo.png","1) Figures/Mirakel's voodood-logo.png","1) Figures/Mirakel's warnado-logo.png","1) Figures/Mirakel's wham-shell-logo.png","1) Figures/Mirakel's whirlwind-logo.png","1) Figures/Mirakel's wrecking-ball-logo.png","1) Figures/Mirakel's zap-logo.png","1) Figures/Mirakel's zook-logo.png","4) In-Game Variants/1) Variants/Mirakel's dark-spyro-logo.png","4) In-Game Variants/2) Legendaries/Mirakel's legendary-bash-logo.png","4) In-Game Variants/2) Legendaries/Mirakel's legendary-chop-chop-logo.png","4) In-Game Variants/2) Legendaries/Mirakel's legendary-spyro-logo.png","4) In-Game Variants/2) Legendaries/Mirakel's legendary-trigger-happy-logo.png","4) In-Game Variants/3) Sidekicks/Mirakel's gill-runt-sidekick-logo.png","4) In-Game Variants/3) Sidekicks/Mirakel's terrabite-sidekick-logo.png","4) In-Game Variants/3) Sidekicks/Mirakel's trigger-snappy-sidekick-logo.png","4) In-Game Variants/3) Sidekicks/Mirakel's whisper-elf-sidekick-logo.png"];


    function init_scale(width, dpi)
    {
	var canvas = document.getElementById("scale_1px");
	var font_height = 8;
	var c_height = 30;
	var s_height = c_height / 2 - 1;

	c_width = width / mm_in * dpi;
	mm_width = width;

	canvas.width = parseInt(c_width);
	canvas.height = 1;

	canvas = document.getElementById("scale");

	canvas.width = parseInt(c_width);
	canvas.height = c_height;

	const ctx = canvas.getContext("2d");
	
	ctx.font = font_height + "px serif";
	ctx.strokeStyle = 'black';
	ctx.lineWidth = 2;

	ctx.beginPath();
	ctx.moveTo(canvas.width - 2, 0);
	ctx.lineTo(canvas.width - 2, c_height);
	ctx.stroke();
	
	for ( i = 0 ; i < width ; i++ )
	{
	    pos = i / width * c_width + 1;

	    if ( i % 10 == 0 )
	    {
		ctx.fillText( i + " mm", pos + 4, c_height - s_height + font_height );
		ctx.lineWidth = 2;
		h = s_height;
	    }
	    else
	    {
		ctx.lineWidth = 1;
		h = s_height / 2;
	    }

	    ctx.beginPath();
	    ctx.moveTo(pos, c_height);
	    ctx.lineTo(pos, c_height - h);
	    ctx.stroke();
	}

	for ( i = 0 ; i < width / mm_in * 16; i++ )
	{
	    pos = i * mm_in / 16 / width * c_width + 1;
	    h = 10;
	    if ( i % 16 == 0 )
	    {
		ctx.lineWidth = 2;
		h = s_height;
	    }
	    else
	    {
		if ( i % 8 == 0 )
		{
		    h = s_height * 3 / 4;
		    ctx.lineWidth = 2;
		}
		else
		{
		    if ( i % 2 == 0 )
			h = s_height * 3 / 5;
		    else
			h = s_height * 3 / 6;
		}
		ctx.lineWidth = 1;
	    }
	    ctx.beginPath();
	    ctx.moveTo(pos, 0);
	    ctx.lineTo(pos, h);
	    ctx.stroke();
	}

	for ( i = 0 ; i < width / mm_in  ; i++ )
	{
	    pos = i * mm_in / width * c_width;
	    ctx.fillText( i + " in", pos + 4, s_height);
	}
    }

    function hide(id)
    {
	document.getElementById(id).style.display = "none";
    }

    function generate()
    {
	document.getElementById("scale").style.display = "inline";
	document.getElementById("scale_1px").style.display = "inline";
	document.getElementById("images").style.display = "inline";
	init_scale(document.getElementById("sizeA").value, dpi);
	hide("start_form");

	coin_size = document.getElementById("coinSize").value;

	var cs = parseInt(coin_size / mm_width * c_width);

	imgs = document.getElementById("images");
	for (let i=0; i < coins.length; i++)
	{
	    var img = document.createElement('img');
            img.src = coins[i];

	    
	    img.style.height = cs + "px";
	    img.style.width = cs + "px";
	    img.id = 'im' + i;
	    img.onclick = function(){hide('im' + i);}
	    img.style.paddingRight = '2px';

            imgs.appendChild(img);
	}

    }

</script>
</html>
