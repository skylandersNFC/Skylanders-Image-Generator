<!DOCTYPE html>
 <head>
  <meta charset="utf-8">
 </head>
 <body>
    <canvas id='scale_1px' style='display:none;'></canvas>
    <canvas id='scale' style='display:none;' onClick='hide("scale")'></canvas>
    <div id='start_form'>
	<form>
	    <div>Size A in millimetres: <input id='sizeA' type=text value=190></div>
	    <div>Coin size in millimetres: <input id='coinSize' type=text value=26></div>
	    <input type=button value=Generate onClick='generate()'>
	    <br><br>
	</form>
    <div>Example for A4, the size A is different for each printer model.</div>
    <img src="../../../../images/sample.jpg">
    </div>
	
	<div id="images" style="display:none;">
		<br>
		<div id="info" style="text-align: center;">
			<input type="button" onclick='hide("info")' value="Click on image to remove from print">
		</div>
		<br>
		<div style="text-align: center;">
			Once you’re <span style="color: red;">satisfied</span> with the images on this page, press <span style="color: red;">Ctrl+P</span> to open the print view and <span style="color: red;">print</span> the page.
		</div>
		<br>
	</div>
	
 </body>
<script>

    var dpi = 300;
    var mm_in = 25.4;
    var c_width;
    var mm_width;

	const coins = ["1) Senseis/Mirakel's air-strike.png","1) Senseis/Mirakel's ambush.png","1) Senseis/Mirakel's aurora.png","1) Senseis/Mirakel's barbella.png","1) Senseis/Mirakel's boom-bloom.png","1) Senseis/Mirakel's buckshot.png","1) Senseis/Mirakel's chain-reaction.png","1) Senseis/Mirakel's chopscotch.png","1) Senseis/Mirakel's crash-bandicoot.png","1) Senseis/Mirakel's dr-neo-cortex.png","1) Senseis/Mirakel's ember.png","1) Senseis/Mirakel's flare-wolf.png","1) Senseis/Mirakel's king-pen.png","1) Senseis/Mirakel's mysticat.png","1) Senseis/Mirakel's pit-boss.png","1) Senseis/Mirakel's ro-bow.png","1) Senseis/Mirakel's starcast.png","1) Senseis/Mirakel's tidepool.png","1) Senseis/Mirakel's tri-tip.png","1) Senseis/Mirakel's wild-storm.png","2) Villain Senseis/Mirakel's bad-juju.png","2) Villain Senseis/Mirakel's blaster-tron.png","2) Villain Senseis/Mirakel's chompy-mage.png","2) Villain Senseis/Mirakel's dr-krankcase.png","2) Villain Senseis/Mirakel's golden-queen.png","2) Villain Senseis/Mirakel's grave-clobber.png","2) Villain Senseis/Mirakel's hood-sickle.png","2) Villain Senseis/Mirakel's kaos.png","2) Villain Senseis/Mirakel's pain-yatta.png","2) Villain Senseis/Mirakel's tae-kwon-crow.png","2) Villain Senseis/Mirakel's wolfgang.png","5) In-Game Variant Senseis/1) In-Game Variants/Mirakel's candy-coated-chopscotch.png","5) In-Game Variant Senseis/1) In-Game Variants/Mirakel's dark-king-pen.png","5) In-Game Variant Senseis/1) In-Game Variants/Mirakel's egg-bomber-air-strike.png","5) In-Game Variant Senseis/1) In-Game Variants/Mirakel's hard-boiled-flare-wolf.png","5) In-Game Variant Senseis/1) In-Game Variants/Mirakel's solar-flare-aurora.png","5) In-Game Variant Senseis/2) Legendaries/Mirakel's legendary-pit-boss.png","5) In-Game Variant Senseis/2) Legendaries/Mirakel's legendary-tri-tip.png","6) In-Game Variant Villain Senseis/Mirakel's dark-golden-queen.png","6) In-Game Variant Villain Senseis/Mirakel's dark-wolfgang.png","6) In-Game Variant Villain Senseis/Mirakel's jingle-bell-chompy-mage.png","6) In-Game Variant Villain Senseis/Mirakel's mystical-bad-juju.png","6) In-Game Variant Villain Senseis/Mirakel's mystical-tae-kwon-crow.png","6) In-Game Variant Villain Senseis/Mirakel's steel-plated-hood-sickle.png","7) Chase Variants/1) Senseis/SkylandersNFC's Clear Starcast.png","7) Chase Variants/1) Senseis/SkylandersNFC's Dec-Ember (Employee Edition).png","7) Chase Variants/1) Senseis/SkylandersNFC's Happy Birthday Ben Starcast.png","7) Chase Variants/1) Senseis/SkylandersNFC's Orange Chain Reaction.png","7) Chase Variants/1) Senseis/SkylandersNFC's Pink Barbella.png","7) Chase Variants/2) Villain Senseis/SkylandersNFC's Rock Candy Pain-Yatta.png","8) Unreleased/SkylandersNFC's Goldie.png"];

    function init_scale(width, dpi)
    {
	var canvas = document.getElementById("scale_1px");
	var font_height = 8;
	var c_height = 30;
	var s_height = c_height / 2 - 1;

	c_width = width / mm_in * dpi;
	mm_width = width;

	canvas.width = parseInt(c_width);
	canvas.height = 1;

	canvas = document.getElementById("scale");

	canvas.width = parseInt(c_width);
	canvas.height = c_height;

	const ctx = canvas.getContext("2d");
	
	ctx.font = font_height + "px serif";
	ctx.strokeStyle = 'black';
	ctx.lineWidth = 2;

	ctx.beginPath();
	ctx.moveTo(canvas.width - 2, 0);
	ctx.lineTo(canvas.width - 2, c_height);
	ctx.stroke();
	
	for ( i = 0 ; i < width ; i++ )
	{
	    pos = i / width * c_width + 1;

	    if ( i % 10 == 0 )
	    {
		ctx.fillText( i + " mm", pos + 4, c_height - s_height + font_height );
		ctx.lineWidth = 2;
		h = s_height;
	    }
	    else
	    {
		ctx.lineWidth = 1;
		h = s_height / 2;
	    }

	    ctx.beginPath();
	    ctx.moveTo(pos, c_height);
	    ctx.lineTo(pos, c_height - h);
	    ctx.stroke();
	}

	for ( i = 0 ; i < width / mm_in * 16; i++ )
	{
	    pos = i * mm_in / 16 / width * c_width + 1;
	    h = 10;
	    if ( i % 16 == 0 )
	    {
		ctx.lineWidth = 2;
		h = s_height;
	    }
	    else
	    {
		if ( i % 8 == 0 )
		{
		    h = s_height * 3 / 4;
		    ctx.lineWidth = 2;
		}
		else
		{
		    if ( i % 2 == 0 )
			h = s_height * 3 / 5;
		    else
			h = s_height * 3 / 6;
		}
		ctx.lineWidth = 1;
	    }
	    ctx.beginPath();
	    ctx.moveTo(pos, 0);
	    ctx.lineTo(pos, h);
	    ctx.stroke();
	}

	for ( i = 0 ; i < width / mm_in  ; i++ )
	{
	    pos = i * mm_in / width * c_width;
	    ctx.fillText( i + " in", pos + 4, s_height);
	}
    }

    function hide(id)
    {
	document.getElementById(id).style.display = "none";
    }

    function generate()
    {
	document.getElementById("scale").style.display = "inline";
	document.getElementById("scale_1px").style.display = "inline";
	document.getElementById("images").style.display = "inline";
	init_scale(document.getElementById("sizeA").value, dpi);
	hide("start_form");

	coin_size = document.getElementById("coinSize").value;

	var cs = parseInt(coin_size / mm_width * c_width);

	imgs = document.getElementById("images");
	for (let i=0; i < coins.length; i++)
	{
	    var img = document.createElement('img');
            img.src = coins[i];

	    
	    img.style.height = cs + "px";
	    img.style.width = cs + "px";
	    img.id = 'im' + i;
	    img.onclick = function(){hide('im' + i);}
	    img.style.paddingRight = '2px';

            imgs.appendChild(img);
	}

    }

</script>
</html>
